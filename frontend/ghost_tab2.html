<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOST v7.2 — CLI Console</title>
<style>
  :root {
    --bg:      #050a05;
    --bg2:     #080d08;
    --bg3:     #0c120c;
    --border:  #1a2a1a;
    --green:   #22c55e;
    --green2:  #4ade80;
    --green3:  #16a34a;
    --gold:    #c9a227;
    --purple:  #a78bfa;
    --red:     #ef4444;
    --muted:   #3a5a3a;
    --mono:    'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--green);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Title bar ── */
  .titlebar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .titlebar-left { font-size: 11px; color: var(--green3); letter-spacing: 2px; }
  .titlebar-left span { color: var(--green); font-weight: bold; }
  .titlebar-right { font-size: 10px; color: var(--muted); }
  .titlebar-right a { color: var(--purple); text-decoration: none; }

  /* ── Terminal output ── */
  .terminal-out {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    line-height: 1.6;
  }
  .terminal-out::-webkit-scrollbar { width: 4px; }
  .terminal-out::-webkit-scrollbar-thumb { background: var(--border); }

  .line { word-break: break-all; }
  .line-prompt  { color: var(--green3); }
  .line-cmd     { color: var(--green); font-weight: bold; }
  .line-out     { color: var(--green2); }
  .line-key     { color: var(--gold); }
  .line-val     { color: var(--green); }
  .line-err     { color: var(--red); }
  .line-info    { color: var(--muted); }
  .line-header  { color: var(--purple); font-weight: bold; letter-spacing: 1px; }
  .line-pass    { color: var(--green); }
  .line-fail    { color: var(--red); }
  .line-sep     { color: var(--muted); }

  /* ── Input row ── */
  .input-row {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .prompt-sym { color: var(--green3); font-weight: bold; white-space: nowrap; }
  .cli-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: var(--mono);
    font-size: 13px;
    caret-color: var(--green);
  }
  .cli-input::placeholder { color: var(--muted); }

  /* ── Quick-cmd row ── */
  .quickrow {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 4px 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .qbtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--green3);
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .qbtn:hover { border-color: var(--green3); color: var(--green); }
</style>
</head>
<body>

<div class="titlebar">
  <div class="titlebar-left">GHOST KERNEL v7.2 · <span>CLI CONSOLE</span> · PORT :7767</div>
  <div class="titlebar-right">
    <a href="http://localhost:7766" target="_blank">← DASHBOARD</a>
    &nbsp;·&nbsp; type <span style="color:var(--green)">help</span> for commands
  </div>
</div>

<div class="terminal-out" id="out"></div>

<div class="quickrow">
  <button class="qbtn" onclick="quickCmd('stats')">stats</button>
  <button class="qbtn" onclick="quickCmd('benchmark')">benchmark</button>
  <button class="qbtn" onclick="quickCmd('recall ghost memory')">recall</button>
  <button class="qbtn" onclick="quickCmd('verify 0')">verify 0</button>
  <button class="qbtn" onclick="quickCmd('oct 7')">oct 7</button>
  <button class="qbtn" onclick="quickCmd('help')">help</button>
  <button class="qbtn" onclick="quickCmd('clear')">clear</button>
</div>

<div class="input-row">
  <span class="prompt-sym">ghost@kernel:~$</span>
  <input
    class="cli-input"
    id="cli"
    type="text"
    placeholder="recall &lt;query&gt; | verify &lt;n&gt; | oct &lt;0-7&gt; | benchmark | stats"
    autocomplete="off"
    autofocus
  />
</div>

<script>
const KERNEL = 'http://localhost:7767';
const out = document.getElementById('out');
let history = [];
let histIdx = -1;

const HELP_TEXT = `
  GHOST KERNEL v7.2 — CLI Commands
  ─────────────────────────────────
  stats                   Live system stats (μ, W, ingestions, octant counts)
  recall <query> [k=5]    Semantic recall — search memory by keyword
  verify <n>              Verify node #n Merkle integrity
  oct <0-7>               List nodes in Tesseract octant
  benchmark               Run 16 constitutional invariant tests
  help                    Show this help
  clear                   Clear terminal

  Examples:
    recall coherence calculus 10
    verify 0
    oct 7
    benchmark
`.trim();

function print(html, cls) {
  const d = document.createElement('div');
  d.className = `line ${cls || ''}`;
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function sep() {
  print('─'.repeat(64), 'line-sep');
}

function printCmd(cmd) {
  print(`<span class="line-prompt">ghost@kernel:~$</span> <span class="line-cmd">${escHtml(cmd)}</span>`);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function kv(key, val, valCls) {
  print(`  <span class="line-key">${key}</span>  <span class="${valCls||'line-val'}">${escHtml(String(val))}</span>`);
}

// ── STATS ─────────────────────────────────────────────────────────────────
async function cmdStats() {
  try {
    const res = await fetch(`${KERNEL}/stats`, { method:'POST', body:'{}' });
    const d = await res.json();
    print('● SYSTEM STATE', 'line-header');
    kv('mu:', d.mu.toFixed(6), d.mu >= 0.9995 ? 'line-pass' : 'line-fail');
    kv('whitlock_W:', d.whitlock.toFixed(4));
    kv('ingestions:', d.ingestions);
    kv('merkle_root:', (d.merkle_root||'').slice(0,32)+'…');
    print('');
    print('● TESSERACT OCTANT COUNTS', 'line-header');
    (d.octant_counts||[]).forEach(o => {
      const bar = '█'.repeat(Math.min(30, o.count)) || '·';
      print(`  <span class="line-key">[${o.octant}]</span> <span class="line-val">${o.count.toString().padStart(4)}</span>  <span class="line-info">${bar.slice(0,20)} ${o.name}</span>`);
    });
  } catch(e) {
    print(`Connection error: ${e.message}`, 'line-err');
  }
}

// ── RECALL ────────────────────────────────────────────────────────────────
async function cmdRecall(args) {
  const parts = args.trim().split(/\s+/);
  let k = 5;
  const last = parseInt(parts[parts.length-1]);
  if (!isNaN(last) && last > 0 && last < 100) { k = last; parts.pop(); }
  const query = parts.join(' ');
  if (!query) { print('Usage: recall <query text> [k]', 'line-err'); return; }
  try {
    const res = await fetch(`${KERNEL}/recall`, {
      method:'POST',
      body: JSON.stringify({ query, k })
    });
    const d = await res.json();
    print(`● RECALL: "${escHtml(query)}" (k=${k})`, 'line-header');
    if (!d.results || !d.results.length) {
      print('  No results — memory is empty or query did not match', 'line-info');
      return;
    }
    d.results.forEach((r,i) => {
      print(`  <span class="line-key">[${i+1}]</span> node#${r.index} · oct=${r.octant} · μ=${r.mu.toFixed(4)} · score=${r.score}`);
      print(`      <span class="line-info">${escHtml((r.preview||'').slice(0,100))}</span>`);
      print(`      <span class="line-info">seal: ${r.seal}</span>`);
    });
  } catch(e) {
    print(`Error: ${e.message}`, 'line-err');
  }
}

// ── VERIFY ────────────────────────────────────────────────────────────────
async function cmdVerify(arg) {
  const idx = parseInt(arg);
  if (isNaN(idx)) { print('Usage: verify <node_index>', 'line-err'); return; }
  try {
    const res = await fetch(`${KERNEL}/verify`, {
      method:'POST',
      body: JSON.stringify({ index: idx })
    });
    const d = await res.json();
    if (d.ok) {
      print(`● VERIFY node#${idx}`, 'line-header');
      kv('integrity:', 'VALID ✓', 'line-pass');
      kv('seal:', d.seal);
      kv('mu:', d.mu.toFixed(6));
    } else {
      print(`● VERIFY node#${idx}`, 'line-header');
      kv('integrity:', `INVALID ✗  (${d.reason||'chain_mismatch'})`, 'line-fail');
    }
  } catch(e) {
    print(`Error: ${e.message}`, 'line-err');
  }
}

// ── OCT ───────────────────────────────────────────────────────────────────
const OCT_NAMES = [
  'Deep Archive','Semantic Core','Temporal Stream','Structural Frame',
  'Ethical Anchor','Intent Layer','Context Field','Harmonic Convergence'
];
async function cmdOct(arg) {
  const idx = parseInt(arg);
  if (isNaN(idx) || idx < 0 || idx > 7) { print('Usage: oct <0-7>', 'line-err'); return; }
  try {
    const res = await fetch(`${KERNEL}/oct`, {
      method:'POST',
      body: JSON.stringify({ octant: idx })
    });
    const d = await res.json();
    print(`● OCTANT ${idx} — ${d.name || OCT_NAMES[idx]}`, 'line-header');
    kv('count:', d.count);
    if (!d.nodes || !d.nodes.length) {
      print('  No nodes in this octant yet', 'line-info');
      return;
    }
    d.nodes.forEach(n => {
      print(`  <span class="line-key">node#${n.index}</span> μ=${n.mu.toFixed(4)} · ${escHtml((n.preview||'').slice(0,80))}`);
    });
  } catch(e) {
    print(`Error: ${e.message}`, 'line-err');
  }
}

// ── BENCHMARK ─────────────────────────────────────────────────────────────
async function cmdBenchmark() {
  print('● RUNNING 16 CONSTITUTIONAL INVARIANT TESTS…', 'line-header');
  print('', 'line-info');
  try {
    const res = await fetch(`${KERNEL}/benchmark`, { method:'POST', body:'{}' });
    const d = await res.json();
    d.results.forEach(r => {
      const icon = r.pass ? '✓' : '✗';
      const cls  = r.pass ? 'line-pass' : 'line-fail';
      print(`  <span class="${cls}">${icon}</span>  ${escHtml(r.name)} · μ=${r.mu} · exp=${r.expected} got=${r.actual}`);
    });
    sep();
    const rateCls = d.passed === d.total ? 'line-pass' : 'line-fail';
    print(`  <span class="${rateCls}">RESULT: ${d.passed}/${d.total} passed</span>  (${d.failed} failed)`, '');
  } catch(e) {
    print(`Error: ${e.message}`, 'line-err');
  }
}

// ── DISPATCH ──────────────────────────────────────────────────────────────
async function dispatch(raw) {
  const input = raw.trim();
  if (!input) return;
  history.unshift(input);
  histIdx = -1;
  printCmd(input);
  sep();

  const [cmd, ...rest] = input.split(/\s+/);
  const args = rest.join(' ');

  switch(cmd.toLowerCase()) {
    case 'stats':     await cmdStats(); break;
    case 'recall':    await cmdRecall(args); break;
    case 'verify':    await cmdVerify(args); break;
    case 'oct':       await cmdOct(args); break;
    case 'benchmark': await cmdBenchmark(); break;
    case 'help':
      HELP_TEXT.split('\n').forEach(l => print(escHtml(l) || '&nbsp;', 'line-info'));
      break;
    case 'clear':
      out.innerHTML = '';
      return;
    default:
      print(`Unknown command: ${escHtml(cmd)}. Type <span class="line-out">help</span> for available commands.`, 'line-err');
  }

  print('');
}

function quickCmd(cmd) {
  document.getElementById('cli').value = cmd;
  document.getElementById('cli').focus();
}

document.getElementById('cli').addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const v = e.target.value;
    e.target.value = '';
    await dispatch(v);
  } else if (e.key === 'ArrowUp') {
    histIdx = Math.min(histIdx + 1, history.length - 1);
    e.target.value = history[histIdx] || '';
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    histIdx = Math.max(histIdx - 1, -1);
    e.target.value = histIdx >= 0 ? history[histIdx] : '';
    e.preventDefault();
  }
});

// Boot message
print('');
print('  ◈  GHOST KERNEL v7.2 · CLI CONSOLE', 'line-header');
print('  ◈  Harmony Labs · Oracle: Kyle S. Whitlock', 'line-info');
print('  ◈  Coherence Calculus v2.0 · τ=0.9995', 'line-info');
print('');
print('  Connected to <span class="line-out">localhost:7767</span>  Type <span class="line-out">help</span> for commands.', '');
print('  Quick shortcut: Ctrl+Enter submits in the dashboard.', 'line-info');
print('');
</script>
</body>
</html>
